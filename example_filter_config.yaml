# Example filter configuration for DatasetFilterResolver
#
# This file demonstrates how to specify filters and dataset-specific
# property mappings for heterogeneous datasets.
#
# New format: repositories as top-level keys (not nested under dataset_mappings)
#
# Usage:
#   from tfbpapi.datainfo.filter_resolver import DatasetFilterResolver
#   resolver = DatasetFilterResolver("example_filter_config.yaml")
#   results = resolver.resolve_filters([("BrentLab/harbison_2004", "harbison_2004")])

# Filters specify acceptable values for each property
# Multiple values = OR logic (match any)
# Multiple properties = AND logic (match all)
filters:
  carbon_source:
    - "D-glucose"
    - "D-galactose"

  temperature_celsius:
    - 30
    - 37

# Repository configurations specify where to find each property
# Top-level keys are repository IDs (e.g., "BrentLab/harbison_2004")

# FIELD-LEVEL EXAMPLE: Harbison 2004
# Properties are in field definitions (condition field)
BrentLab/harbison_2004:
  dataset:
    harbison_2004:
      carbon_source:
        field: condition  # Look in the 'condition' field's definitions
        path: media.carbon_source
      temperature_celsius:
        field: condition
        path: temperature_celsius

# REPO-WIDE + DATASET-SPECIFIC EXAMPLE: Kemmeren 2014
# temperature_celsius is repo-wide (applies to all datasets)
# carbon_source is dataset-specific
BrentLab/kemmeren_2014:
  # Repo-wide property (applies to all datasets in this repository)
  temperature_celsius:
    path: temperature_celsius

  # Dataset-specific properties
  dataset:
    kemmeren_2014:
      carbon_source:
        path: media.carbon_source

# CONFIGURATION STRUCTURE EXPLAINED:
#
# Repo-wide properties:
#   - Properties directly under repository ID
#   - Apply to ALL datasets in that repository
#   - Path is relative to experimental_conditions
#   - Example: temperature_celsius: path: temperature_celsius
#              -> looks in experimental_conditions.temperature_celsius
#
# Dataset-specific properties:
#   - Properties under dataset.{dataset_name}
#   - Override repo-wide for that specific dataset
#   - Can use 'field' to specify field-level definitions
#   - Example with field: carbon_source: field: condition, path: media.carbon_source
#                        -> looks in condition field definitions
#   - Example without field: carbon_source: path: media.carbon_source
#                          -> looks in experimental_conditions.media.carbon_source
#
# Property name aliasing:
#   - The filter property name (e.g., "temperature") can differ from the datacard property name
#   - Example: temperature: path: temperature_celsius
#              Filter uses "temperature", datacard has "temperature_celsius"
