site_name: tfbpapi
site_description: "A collection of objects and functions to work with calling cards sequencing tools"
site_author: "ben mueller <email@email.com>, chase mateusiak <chasem@wustl.edu>, michael brent <brent@wustl.edu>"
site_url: "https://brentlab.github.io/tfbpapi"
repo_url: "https://github.com/brentlab/tfbpapi"
repo_name: "brentlab/tfbpapi"
edit_uri: "edit/main/docs/"
watch: ['tfbpapi', 'docs']

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - autorefs
  - section-index
  - mkdocs-jupyter:
      remove_tag_config:
        remove_input_tags:
          - hide
        remove_output_tags:
          - hide
      execute: false
      allow_errors: false
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          import:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://pandas.pydata.org/docs/objects.inv
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - smarty
  - tables
  - toc:
      permalink: true
      title: On this page
  - sane_lists
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: brentlab
      repo: tfbpapi
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/brentlab/tfbpapi
      name: GitHub Repository
  version:
    provider: mike
    default: latest

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
  - js/init-mermaid.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Tutorials:
    - Database tfbpapi: tutorials/database_tfbpapi.ipynb
  - API:
    - Database tfbpapi:
      - Records Only Classes:
        - BindingManualQCAPI.md
        - DataSourceAPI.md
        - DtoAPI.md
        - ExpressionManualQCAPI.md
        - FileFormatAPI.md
        - GenomicFeatureAPI.md
        - RegulatorAPI.md
      - Records and Files Classes:
        - BindingAPI: BindingAPI.md
        - BindingConcatenatedAPI: BindingConcatenatedAPI.md
        - CallingCardsBackgroundAPI: CallingCardsBackgroundAPI.md
        - ExpressionAPI: ExpressionAPI.md
        - PromoterSetAPI: PromoterSetAPI.md
        - PromoterSetSigAPI: PromoterSetSigAPI.md
      - Developer Classes:
        - AbstractAPI.md
        - AbstractRecordsAndFilesAPI.md
        - AbstractRecordsOnlyAPI.md
        - AbstractHfAPI.md
        - HfCacheManager.md
        - Cache.md
        - ParamsDict.md
